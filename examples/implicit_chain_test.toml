name = "Implicit Chain Test"

# No manual detect_text needed — the builder auto-inserts it.

[[action]]
type = "app_intent"
bundle_identifier = "io.tailscale.ipn.macsys"
app_intent_identifier = "ToggleAppIntent"
name = "Tailscale"

[[action]]
type = "set_variable"
name = "status"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
name = "Implicit Chain Test"
contents = "Tailscale toggled: {{status}}"
