name = "Full Pipeline Test"

# Fetch a URL, get Tailscale status, battery, compose into a note

[[action]]
type = "url"
url = "https://httpbin.org/ip"

[[action]]
type = "get_url"

[[action]]
type = "set_variable"
name = "public_ip"

[[action]]
type = "get_battery_level"

[[action]]
type = "detect_text"

[[action]]
type = "set_variable"
name = "battery"

[[action]]
type = "app_intent"
bundle_identifier = "io.tailscale.ipn.macsys"
app_intent_identifier = "GetStatusIntent"
name = "Tailscale"
uuid = "TS-STATUS-UUID-0000-000000000001"

[[action]]
type = "text"
text = "System Report\n=============\nPublic IP: {{public_ip}}\nBattery: {{battery}}%\nTailscale: <<TS-STATUS-UUID-0000-000000000001:Status.connected>>\nAccount: <<TS-STATUS-UUID-0000-000000000001:Status.profileName>>"

[[action]]
type = "set_variable"
name = "report"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
name = "System Report"
contents = "{{report}}"
