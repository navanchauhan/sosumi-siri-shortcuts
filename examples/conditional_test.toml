name = "Conditional Test"

# Toggle Tailscale, check if connected, create note with result

[[action]]
type = "app_intent"
bundle_identifier = "io.tailscale.ipn.macsys"
app_intent_identifier = "ToggleAppIntent"
name = "Tailscale"

[[action]]
type = "detect_text"

[[action]]
type = "set_variable"
name = "toggle_result"

[[action]]
type = "if"
condition = "Equals"
compare_with = "Yes"

[[action]]
type = "text"
text = "Tailscale is now CONNECTED"

[[action]]
type = "else"

[[action]]
type = "text"
text = "Tailscale is now DISCONNECTED"

[[action]]
type = "endif"

[[action]]
type = "set_variable"
name = "message"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
name = "Conditional Test"
contents = "{{message}}"
