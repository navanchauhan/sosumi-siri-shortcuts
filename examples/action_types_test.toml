name = "Action Types Test"

# Test url + get_url + text actions through the pipeline

[[action]]
type = "url"
url = "https://httpbin.org/get"

[[action]]
type = "get_url"

[[action]]
type = "set_variable"
name = "response"

[[action]]
type = "text"
text = "Got response: {{response}}"

[[action]]
type = "set_variable"
name = "message"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
name = "Action Types Test"
contents = "{{message}}"
