# Example: Ask ChatGPT a question and save the response to Notes
# This demonstrates chaining App Intents from different apps

name = "ChatGPT to Notes"

[[action]]
type = "app_intent"
bundle_identifier = "com.openai.chat"
app_intent_identifier = "AskIntent"
name = "ChatGPT"

[action.parameters]
prompt = "What's a fun fact about shortcuts automation on macOS?"
newChat = true
continuous = false

[[action]]
type = "set_variable"
name = "chatgpt_response"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
title = "ChatGPT Response"
# Note: In a real workflow, you'd use variable substitution here
