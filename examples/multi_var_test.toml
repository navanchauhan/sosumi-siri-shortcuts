name = "Multi Variable Test"

# Toggle Tailscale twice, compose both results into a text, create note.

[[action]]
type = "app_intent"
bundle_identifier = "io.tailscale.ipn.macsys"
app_intent_identifier = "ToggleAppIntent"
name = "Tailscale"

[[action]]
type = "detect_text"

[[action]]
type = "set_variable"
name = "toggle_result"

[[action]]
type = "app_intent"
bundle_identifier = "io.tailscale.ipn.macsys"
app_intent_identifier = "ToggleAppIntent"
name = "Tailscale"

[[action]]
type = "detect_text"

[[action]]
type = "set_variable"
name = "restore_result"

# Compose both variables into one string using a Text action
[[action]]
type = "text"
text = "First toggle: {{toggle_result}}, Restored: {{restore_result}}"

[[action]]
type = "detect_text"

[[action]]
type = "set_variable"
name = "composed"

[[action]]
type = "app_intent"
bundle_identifier = "com.apple.Notes"
app_intent_identifier = "CreateNoteLinkAction"
name = "Notes"

[action.parameters]
name = "bsiri Multi-Var Test"
contents = "{{composed}}"
